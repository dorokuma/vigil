version: '3.8'

services:
  vigil-collector:
    image: python:3.11-slim
    container_name: vigil-collector
    ports:
      - "9901:9901"
    volumes:
      - ./bot-ext:/app/bot-ext:ro
      - ./your-bot.py:/app/your-bot.py   # <-- put your Telegram bot integration script here
      - ./fullchain.pem:/app/fullchain.pem:ro
      - ./privkey.pem:/app/privkey.pem:ro
      - ./vigil.db:/app/vigil.db
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - TOKEN=super-secret-123   # change this!
    command: python your-bot.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9901/health"]
      interval: 30s
      timeout: 10s
      retries: 3
