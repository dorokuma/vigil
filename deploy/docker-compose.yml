version: '3.8'

services:
  vigil-collector:
    image: python:3.11-slim
    container_name: vigil-collector
    ports:
      - "9901:9901"
    volumes:
      - ./bot:/app/bot:ro
      - ./vigil.db:/app/vigil.db
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - VIGIL_TOKEN=your-secret-token   # change this!
    command: python -m bot.main
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9901/health"]
      interval: 30s
      timeout: 10s
      retries: 3
