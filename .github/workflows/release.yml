name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build
        working-directory: ./agent
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=${{ matrix.goarch }} go build -o dist/vigil-agent-linux-${{ matrix.goarch }} ./...
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: vigil-agent-linux-${{ matrix.goarch }}
          path: agent/dist/vigil-agent-linux-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vigil-agent-linux-amd64/vigil-agent-linux-amd64
            vigil-agent-linux-arm64/vigil-agent-linux-arm64
          generate_release_notes: true
