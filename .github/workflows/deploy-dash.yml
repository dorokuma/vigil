name: Deploy Dashboard to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'dash/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: ./dash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './dash/package-lock.json'
      - name: Install & Build
        run: |
          npm ci
          npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: ./dash
          command: pages deploy dist --project-name=dash
